<!DOCTYPE html>
<html>
<head>
    <title>Store</title>
    <style>
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .product-card {
            background: #ffffff;
            border-radius: 14px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.08);
        }

        .product-card-body {
            padding: 20px;
        }

        .product-name a {
            color: #111;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
        }

        .product-name a:hover {
            text-decoration: underline;
        }

        .product-meta {
            margin-top: 12px;
        }

        .price {
            font-size: 16px;
            font-weight: 600;
        }

        .product-actions {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f0f0f0;
        }

        .btn.primary {
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn.primary:hover {
            background: #1d4ed8;
        }

        .icon-actions a {
            margin-left: 10px;
            font-size: 18px;
            text-decoration: none;
        }

        .product-detail-card {
            max-width: 500px;
            margin: 40px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        .product-title {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 20px;
            color: #2563eb;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .product-desc {
            color: #555;
            margin-bottom: 25px;
        }

        .product-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ghost {
            text-decoration: none;
            color: #000;
        }

        .cart-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        .cart-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .cart-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .cart-item {
            background: #ffffff;
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-info h4 {
            margin: 0;
            font-size: 18px;
        }

        .cart-info .price {
            margin-top: 4px;
            color: #555;
        }

        .cart-footer {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-total {
            font-size: 20px;
            font-weight: 600;
        }

        .checkout-btn {
            padding: 12px 22px;
            font-size: 16px;
        }

        .empty-cart {
            text-align: center;
            margin-top: 50px;
            color: #777;
        }

    </style>
</head>
<body>

{% if user.is_authenticated %}
    <p style="display:flex; justify-content:space-between; width:98vw">Logged in as {{ user.username }} |
       <a href="{% url 'logout' %}">Logout</a></p>
{% else %}
    <a href="{% url 'login' %}">Login</a>
{% endif %}

<hr>

{% block content %}
{% endblock %}

</body>
</html>
